networks:
  service-network:
    name: service-network
services:
  postgres:
    networks:
      - service-network
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    networks:
      - service-network
    image: redis:7-alpine
    ports:
      - "6379:6379"
  frontend:
    networks:
      - service-network
    build:
      platforms:
        - linux/arm64
        - linux/amd64
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
volumes:
  postgres-data:
